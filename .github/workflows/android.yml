name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest --console=plain

      - name: Run Android lint
        run: ./gradlew --no-daemon :app:lintDebug --console=plain

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --console=plain
