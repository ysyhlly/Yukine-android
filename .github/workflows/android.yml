name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust 1.86.0
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt, clippy
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install Android native toolchain
        run: sdkmanager "ndk;28.2.13676358" "cmake;3.22.1"

      - name: Install cargo-ndk 4.1.2
        run: cargo install cargo-ndk --version 4.1.2 --locked

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Check Rust USB backend
        run: |
          cargo fmt --manifest-path feature/playback/src/main/rust/Cargo.toml --check
          cargo clippy --manifest-path feature/playback/src/main/rust/Cargo.toml --locked -- -D warnings
          cargo test --manifest-path feature/playback/src/main/rust/Cargo.toml --locked

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest --console=plain

      - name: Run Android lint
        run: ./gradlew --no-daemon :app:lintDebug --console=plain

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --console=plain

      - name: Compile Android tests
        run: |
          ./gradlew --no-daemon \
            :app:compileDebugAndroidTestKotlin \
            :app:compileDebugAndroidTestJavaWithJavac \
            --console=plain

      - name: Verify USB native libraries
        shell: bash
        run: |
          apk="app/build/outputs/apk/debug/app-debug.apk"
          mapfile -t actual < <(
            unzip -Z1 "$apk" |
              grep -E '^lib/[^/]+/(libusb-1\.0|libecho_usb_iso_rust)\.so$' |
              sort
          )
          expected=(
            "lib/arm64-v8a/libecho_usb_iso_rust.so"
            "lib/arm64-v8a/libusb-1.0.so"
            "lib/x86_64/libecho_usb_iso_rust.so"
            "lib/x86_64/libusb-1.0.so"
          )
          diff \
            <(printf '%s\n' "${expected[@]}") \
            <(printf '%s\n' "${actual[@]}")
          if unzip -Z1 "$apk" | grep -Eq '^lib/(armeabi-v7a|x86)/'; then
            echo "Unexpected legacy ABI found in $apk" >&2
            exit 1
          fi
